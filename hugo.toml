baseURL = 'https://jeremie-naude.fr/'
title = 'Jérémie Naudé'
theme = 'PaperMod'
defaultContentLanguage = 'fr'
defaultContentLanguageInSubdirectory = false

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[languages]
  [languages.fr]
    languageName = "Français"
    weight = 1
    [languages.fr.params]
      description = "Chercheur CNRS en neurosciences expérimentales et théoriques"
      author = "Jérémie Naudé"
  [languages.en]
    languageName = "English"
    weight = 2
    [languages.en.params]
      description = "CNRS researcher in experimental and theoretical neuroscience"

[languages.fr.menu]
  [[languages.fr.menu.main]]
    name = "Recherche"
    url = "/recherche/"
    weight = 1
  [[languages.fr.menu.main]]
    name = "Publications"
    url = "/publications/"
    weight = 2
  [[languages.fr.menu.main]]
    name = "Vulgarisation"
    url = "/vulgarisation/"
    weight = 3
  [[languages.fr.menu.main]]
    name = "Neuro Arnaque"
    url = "/livre/"
    weight = 4
  [[languages.fr.menu.main]]
    name = "Billets"
    url = "/blog/"
    weight = 5
  [[languages.fr.menu.main]]
    name = "Conférences et rencontres"
    url = "/conf/"
    weight = 6
  [[languages.fr.menu.main]]
    name = "À propos"
    url = "/about/"
    weight = 7

[languages.en.menu]
  [[languages.en.menu.main]]
    name = "Research"
    url = "/en/research/"
    weight = 1
  [[languages.en.menu.main]]
    name = "Publications"
    url = "/en/publications/"
    weight = 2
  [[languages.en.menu.main]]
    name = "About"
    url = "/en/about/"
    weight = 3

[params]
  ShowReadingTime = true
  ShowShareButtons = false
  ShowBreadCrumbs = true
  comments = true

[languages.fr.params.profileMode]
    enabled = true
    title = "Jérémie Naudé"
    subtitle = """Chercheur CNRS en neurosciences · [Institut de Génomique Fonctionnelle](https://www.igf.cnrs.fr/equipes/equipe-perroy/), Montpellier.
J'étudie les mécanismes impliqués dans l'apprentissage et des prises décisions: la neuromodulation (dopamine, noradrénaline) et la plasticité neuronale, en combinant modélisation mathématique et expérimentation."""
    imageUrl = "/images/rencontres.jpg"
    imageWidth = 180
    imageHeight = 180
    imageTitle = "Jérémie Naudé"

[languages.en.params.profileMode]
    enabled = true
    title = "Jérémie Naudé"
    subtitle = """CNRS Neuroscience Research Fellow · [Institute of Functional Genomics](https://www.igf.cnrs.fr/equipes/equipe-perroy/), Montpellier. I study the mechanisms involved in learning and decision-making, specifically neuromodulation (dopamine, noradrenaline) and neural plasticity, by combining mathematical modeling with experimental tools."""
    imageUrl = "/images/rencontres.jpg"
    imageWidth = 180
    imageHeight = 180
    imageTitle = "Jérémie Naudé"

  [[params.socialIcons]]
    name = "bluesky"
    url = "https://bsky.app/profile/jeremie-n.bsky.social"
  [[params.socialIcons]]
    name = "email"
    url = "mailto:jeremie.naude@igf.cnrs.fr"
